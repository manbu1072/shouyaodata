name: Build
on: [push]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Configure Python pip
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set install.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml pyinstaller --quiet

      - name: Build Python executables
        run: |
          pyinstaller --onefile --name crawler veterinary_drug_crawler.py
          pyinstaller --onefile --name service app.py
        shell: bash

      - name: Build macOS app
        run: npm run build:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release_new/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Configure Python pip
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set install.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml pyinstaller --quiet

      - name: Build Python executables
        run: |
          pyinstaller --onefile --name crawler veterinary_drug_crawler.py
          pyinstaller --onefile --name service app.py
        shell: pwsh

      - name: Build Windows app
        run: npm run build:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: release_new/*.exe