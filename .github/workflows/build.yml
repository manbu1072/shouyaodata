name: Build
on: [push]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 配置国内 npm 镜像
        run: |
          npm config set registry https://registry.npmmirror.com
          npm config set electron_mirror https://npmmirror.com/mirrors/electron/
          npm config set electron_builder_binaries_mirror https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 安装依赖
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 配置 Python 国内镜像
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set install.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: 安装 Python 依赖
        run: pip install requests beautifulsoup4 lxml --quiet

      - name: 打包 Python 爬虫脚本
        run: |
          pyinstaller --onefile --name crawler veterinary_drug_crawler.py
          pyinstaller --onefile --name service app.py
        shell: bash

      - name: 构建 macOS 应用
        run: npm run build:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release_new/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 配置国内 npm 镜像
        run: |
          npm config set registry https://registry.npmmirror.com
          npm config set electron_mirror https://npmmirror.com/mirrors/electron/
          npm config set electron_builder_binaries_mirror https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 安装依赖
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 配置 Python 国内镜像
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set install.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: 安装 Python 依赖
        run: pip install requests beautifulsoup4 lxml --quiet

      - name: 打包 Python 爬虫脚本
        run: |
          pyinstaller --onefile --name crawler veterinary_drug_crawler.py
          pyinstaller --onefile --name service app.py
        shell: pwsh

      - name: 构建 Windows 应用
        run: npm run build:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: release_new/*.exe
