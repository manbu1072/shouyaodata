name: Build
on: [push]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: еҰ«вӮ¬йҚ‘иҪ°е”¬йҗ®?
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: з’Ғеү§з–Ҷ Node.js йҗңоҲҡо•Ё
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: й–°е¶Үз–ҶйҚҘи—үе”ҙ npm й—Җж»ғе„ҡ
        run: |
          npm config set registry https://registry.npmmirror.com

      - name: зҖ№еӨҺо—ҠжёҡжҝҠзҰҶ
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: й–°е¶Үз–Ҷ Python йҚҘи—үе”ҙй—Җж»ғе„ҡ
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set install.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: зҖ№еӨҺо—Ҡ Python жёҡжҝҠзҰҶ
        run: pip install requests beautifulsoup4 lxml pyinstaller --quiet

      - name: йҺөж’іеҜҳ Python йҗ–о„ғж«•й‘ҙж°ӯж№°
        run: |
          pyinstaller --onefile --name crawler veterinary_drug_crawler.py
          pyinstaller --onefile --name service app.py
        shell: bash

      - name: йҸӢеӢ«зј“ macOS жҗҙж—Ӯж•Ө
        run: npm run build:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: ж¶“е©Ғзҙ¶йҸӢеӢ«зј“жөңС…еўҝ
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release_new/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: еҰ«вӮ¬йҚ‘иҪ°е”¬йҗ®?
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: з’Ғеү§з–Ҷ Node.js йҗңоҲҡо•Ё
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: й–°е¶Үз–ҶйҚҘи—үе”ҙ npm й—Җж»ғе„ҡ
        run: |
          npm config set registry https://registry.npmmirror.com

      - name: зҖ№еӨҺо—ҠжёҡжҝҠзҰҶ
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: й–°е¶Үз–Ҷ Python йҚҘи—үе”ҙй—Җж»ғе„ҡ
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set install.trusted-host pypi.tuna.tsinghua.edu.cn

      - name: зҖ№еӨҺо—Ҡ Python жёҡжҝҠзҰҶ
        run: pip install requests beautifulsoup4 lxml pyinstaller --quiet

      - name: йҺөж’іеҜҳ Python йҗ–о„ғж«•й‘ҙж°ӯж№°
        run: |
          pyinstaller --onefile --name crawler veterinary_drug_crawler.py
          pyinstaller --onefile --name service app.py
        shell: pwsh

      - name: йҸӢеӢ«зј“ Windows жҗҙж—Ӯж•Ө
        run: npm run build:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: ж¶“е©Ғзҙ¶йҸӢеӢ«зј“жөңС…еўҝ
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: release_new/*.exe
